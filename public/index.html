<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Attendance System</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
    font-family: "Segoe UI", sans-serif;
    margin: 0;
    background: linear-gradient(180deg, #0a1f44, #1e3c72);
    color: white;
}
h1 {
    text-align: center;
    padding: 15px;
    margin: 0;
    font-size: 22px;
    background: #0d1b3d;
    border-bottom: 3px solid gold;
}
.top-panel {
    margin: 10px;
    padding: 15px;
    border-radius: 16px;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    text-align: center;
}
#date { font-size: 14px; margin-bottom: 8px; }
.present-box {
    background: linear-gradient(135deg, #ff3b3b, #ff7b00);
    padding: 10px;
    border-radius: 10px;
    font-weight: bold;
    margin-bottom: 10px;
}
button {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    background: linear-gradient(135deg, gold, #ffd700);
    color: black;
    font-size: 14px;
    cursor: pointer;
}
.camera-box {
    margin-top: 10px;
    background: #0d1b3d;
    padding: 10px;
    border-radius: 12px;
    max-width: 420px;
    margin-left: auto;
    margin-right: auto;
}
#reader {
    width: 100%;
    border-radius: 10px;
    overflow: hidden;
    border: 3px solid #2ecc71;
}
.section {
    margin: 10px;
    padding: 10px;
    border-radius: 16px;
    background: #0d1b3d;
}
.students {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
}
.student {
    padding: 10px;
    border-radius: 10px;
    text-align: center;
    background: #1e3c72;
    font-size: 13px;
}
.student.present {
    background: linear-gradient(135deg, #ff3b3b, gold);
    color: black;
    font-weight: bold;
}
.time {
    font-size: 11px;
    margin-top: 4px;
}
@media (min-width: 768px) {
    .students { grid-template-columns: repeat(4, 1fr); }
    button { width: auto; margin: 5px; }
}
</style>
</head>
<body>

<h1>📷 QR Code Attendance</h1>

<div class="top-panel">
    <div id="date"></div>

    <div class="present-box">
        Present: <span id="presentCount">0</span>
    </div>

    <button id="excelBtn">📥 Export Excel</button>
    <button id="wordBtn">📄 Export Word</button>
    <button id="resetBtn">🔄 Reset Attendance</button>

    <div class="camera-box">
        <h3>📷 Scan QR</h3>
        <div id="reader"></div>
        <button id="switchCamBtn">🔄 Switch Camera</button>
        <button id="startScanBtn">▶️ Start Scan</button>
        <button id="stopScanBtn">⏸ Stop Scan</button>
    </div>
</div>

<div id="container"></div>

<script>
/* DATE */
const today = new Date().toDateString();
document.getElementById("date").textContent = "📅 Date: " + today;
const STORAGE_KEY = "qr_attendance_" + today;

/* STUDENT NAMES */
const sections = {
    "Section A": ["Alice","Bob","Charlie","David","Emma","Frank","Grace","Hannah","Ian","Jack","Kara","Liam","Mia","Noah","Olivia","Peter","Quinn"],
    "Section B": ["Ryan","Sophia","Tom","Uma","Victor","Wendy","Xander","Yara","Zane","Amy","Brian","Clara","Derek","Ella","Felix","Gina","Henry"],
    "Section C": ["Isla","Jake","Kate","Leo","Maya","Nate","Opal","Paul","Queen","Rose","Sam","Tina","Ulysses","Vera","Will","Xena"]
};

let attendanceData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
let presentCount = 0;
const container = document.getElementById("container");

/* BUILD STUDENT LIST */
const studentMap = {};

for (let section in sections) {
    const secDiv = document.createElement("div");
    secDiv.className = "section";
    secDiv.innerHTML = `<h2>${section}</h2>`;

    const grid = document.createElement("div");
    grid.className = "students";

    sections[section].forEach(name => {
        const div = document.createElement("div");
        div.className = "student";
        div.id = name;
        div.innerHTML = `${name}<div class="time"></div>`;

        if (attendanceData[name]) {
            div.classList.add("present");
            div.querySelector(".time").textContent = "⏰ " + attendanceData[name].time;
            presentCount++;
        }

        studentMap[name] = { element: div, section: section };
        grid.appendChild(div);
    });

    secDiv.appendChild(grid);
    container.appendChild(secDiv);
}

document.getElementById("presentCount").textContent = presentCount;

/* BUTTONS */
document.getElementById("excelBtn").addEventListener("click", ()=> window.location.href="/export");
document.getElementById("wordBtn").addEventListener("click", ()=> window.location.href="/export-word");

/* RESET BUTTON */
document.getElementById("resetBtn").addEventListener("click", ()=>{
    if(confirm("Reset all attendance?")){
        localStorage.removeItem(STORAGE_KEY);
        fetch("/reset", { method: "POST" })
        .finally(()=> location.reload());
    }
});

/* QR SCANNER */
let html5QrCode = new Html5Qrcode("reader");
let cameras = [];
let currentCameraIndex = 0;
let scanning = false;

function onScanSuccess(decodedText){
    if(attendanceData[decodedText]) return; // prevent duplicates

    const student = studentMap[decodedText];
    if(!student) return;

    const time = new Date().toLocaleTimeString();
    attendanceData[decodedText] = { section: student.section, time: time };

    student.element.classList.add("present");
    student.element.querySelector(".time").textContent = "⏰ " + time;

    presentCount = Object.keys(attendanceData).length;
    document.getElementById("presentCount").textContent = presentCount;

    localStorage.setItem(STORAGE_KEY, JSON.stringify(attendanceData));

    fetch("/attendance", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id: decodedText, section: student.section, time: time })
    })
    .then(res=>res.text())
    .then(data=>console.log("Server response:", data))
    .catch(err=>console.error("Error sending to server:", err));
}

function startScanner(cameraId){
    html5QrCode.start(cameraId, { fps:10, qrbox:250 }, onScanSuccess)
    .then(()=> scanning=true)
    .catch(err=> console.error(err));
}

function stopScanner(){
    html5QrCode.stop().then(()=> scanning=false).catch(err=> console.error(err));
}

// Get cameras and start back camera
Html5Qrcode.getCameras().then(devs=>{
    cameras = devs;
    if(cameras.length>0){
        currentCameraIndex = cameras.length-1; // back
        startScanner(cameras[currentCameraIndex].id);
    }
});

document.getElementById("startScanBtn").addEventListener("click", ()=>{
    if(!scanning && cameras.length>0) startScanner(cameras[currentCameraIndex].id);
});
document.getElementById("stopScanBtn").addEventListener("click", ()=>{
    if(scanning) stopScanner();
});
document.getElementById("switchCamBtn").addEventListener("click", ()=>{
    if(cameras.length<2) return alert("No second camera found!");
    currentCameraIndex=(currentCameraIndex+1)%cameras.length;
    if(scanning) stopScanner().then(()=> startScanner(cameras[currentCameraIndex].id));
});
</script>

</body>
</html>
