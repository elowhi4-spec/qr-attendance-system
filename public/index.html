<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Attendance System</title>

<!-- QR SCANNER LIBRARY -->
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
    font-family: "Segoe UI", sans-serif;
    margin: 0;
    background: linear-gradient(180deg, #0a1f44, #1e3c72);
    color: white;
}

h1 {
    text-align: center;
    padding: 15px;
    margin: 0;
    font-size: 22px;
    background: #0d1b3d;
    border-bottom: 3px solid gold;
}

.top-panel {
    margin: 10px;
    padding: 15px;
    border-radius: 16px;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    text-align: center;
}

#date {
    font-size: 14px;
    margin-bottom: 8px;
}

.present-box {
    background: linear-gradient(135deg, #ff3b3b, #ff7b00);
    padding: 10px;
    border-radius: 10px;
    font-weight: bold;
    margin-bottom: 10px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    background: linear-gradient(135deg, gold, #ffd700);
    color: black;
    font-size: 14px;
}

.camera-box {
    margin-top: 10px;
    background: #0d1b3d;
    padding: 10px;
    border-radius: 12px;
    max-width: 420px;
    margin-left: auto;
    margin-right: auto;
}

#reader {
    width: 100%;
    border-radius: 10px;
    overflow: hidden;
    border: 3px solid #2ecc71;
}

.section {
    margin: 10px;
    padding: 10px;
    border-radius: 16px;
    background: #0d1b3d;
}

.students {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
}

.student {
    padding: 10px;
    border-radius: 10px;
    text-align: center;
    background: #1e3c72;
    font-size: 13px;
}

.student.present {
    background: linear-gradient(135deg, #ff3b3b, gold);
    color: black;
    font-weight: bold;
}

.time {
    font-size: 11px;
    margin-top: 4px;
}

@media (min-width: 768px) {
    .students {
        grid-template-columns: repeat(4, 1fr);
    }
    button {
        width: auto;
        margin: 5px;
    }
}
</style>
</head>
<body>

<h1>📷 QR Code Attendance</h1>

<div class="top-panel">

    <div id="date"></div>

    <div class="present-box">
        Present: <span id="presentCount">0</span> / 50
    </div>

    <button id="excelBtn">📥 Export Excel</button>
    <button id="wordBtn">📄 Export Word</button>
    <button id="resetBtn">🔄 Reset Attendance</button>

    <div class="camera-box">
        <h3>📷 Scan QR</h3>
        <div id="reader"></div>
    </div>
</div>

<div id="container"></div>

<script>
/* DATE */
const today = new Date().toDateString();
document.getElementById("date").textContent = "📅 Date: " + today;
const STORAGE_KEY = "qr_attendance_" + today;

/* SECTIONS */
const sections = {
    "Section A": 17,
    "Section B": 17,
    "Section C": 16
};

let attendanceData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
let presentCount = 0;

const container = document.getElementById("container");

/* BUILD STUDENT LIST */
let studentNum = 1;
const studentMap = {};

for (let section in sections) {
    const secDiv = document.createElement("div");
    secDiv.className = "section";
    secDiv.innerHTML = `<h2>${section}</h2>`;

    const grid = document.createElement("div");
    grid.className = "students";

    for (let i = 0; i < sections[section]; i++) {
        const name = "Student " + studentNum;

        const div = document.createElement("div");
        div.className = "student";
        div.id = name;
        div.innerHTML = `${name}<div class="time"></div>`;

        if (attendanceData[name]) {
            div.classList.add("present");
            div.querySelector(".time").textContent = "⏰ " + attendanceData[name].time;
            presentCount++;
        }

        studentMap[name] = { element: div, section: section };
        grid.appendChild(div);
        studentNum++;
    }

    secDiv.appendChild(grid);
    container.appendChild(secDiv);
}

document.getElementById("presentCount").textContent = presentCount;

/* QR SCANNER */
function onScanSuccess(decodedText) {
    const student = studentMap[decodedText];
    if (!student) return;

    const time = new Date().toLocaleTimeString();

    // Infinite scanning: always update time
    attendanceData[decodedText] = { section: student.section, time: time };
    student.element.classList.add("present");
    student.element.querySelector(".time").textContent = "⏰ " + time;

    // Update present count
    presentCount = Object.keys(attendanceData).length;
    document.getElementById("presentCount").textContent = presentCount;

    localStorage.setItem(STORAGE_KEY, JSON.stringify(attendanceData));

   // POST scanned attendance
fetch("/attendance", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ id: decodedText, section: student.section, time: time })
});

// Export buttons
document.getElementById("excelBtn").addEventListener("click", () => {
    window.location.href = "/export";
});
document.getElementById("wordBtn").addEventListener("click", () => {
    window.location.href = "/export-word";
});

// Reset button
document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm("Reset all attendance?")) {
        fetch("/reset", { method: "POST" }).then(() => location.reload());
    }
});
</script>

</body>
</html>
