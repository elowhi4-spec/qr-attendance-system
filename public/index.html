<script>
/* DATE */
const today = new Date().toDateString();
document.getElementById("date").textContent = "📅 Date: " + today;
const STORAGE_KEY = "qr_attendance_" + today;

/* SECTIONS */
const sections = {
    "Section A": 17,
    "Section B": 17,
    "Section C": 16
};

let attendanceData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
let presentCount = 0;

const container = document.getElementById("container");

/* BUILD STUDENT LIST */
let studentNum = 1;
const studentMap = {};

for (let section in sections) {
    const secDiv = document.createElement("div");
    secDiv.className = "section";
    secDiv.innerHTML = `<h2>${section}</h2>`;

    const grid = document.createElement("div");
    grid.className = "students";

    for (let i = 0; i < sections[section]; i++) {
        const name = "Student " + studentNum;

        const div = document.createElement("div");
        div.className = "student";
        div.id = name;
        div.innerHTML = `${name}<div class="time"></div>`;

        if (attendanceData[name]) {
            div.classList.add("present");
            div.querySelector(".time").textContent = "⏰ " + attendanceData[name].time;
            presentCount++;
        }

        studentMap[name] = { element: div, section: section };
        grid.appendChild(div);
        studentNum++;
    }

    secDiv.appendChild(grid);
    container.appendChild(secDiv);
}

document.getElementById("presentCount").textContent = presentCount;

/* ✅ BUTTONS (MOVED OUTSIDE) */
document.getElementById("excelBtn").addEventListener("click", () => {
    window.location.href = "/export";
});

document.getElementById("wordBtn").addEventListener("click", () => {
    window.location.href = "/export-word";
});

document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm("Reset all attendance?")) {
        fetch("/reset", { method: "POST" }).then(() => location.reload());
    }
});

/* QR SCANNER */
function onScanSuccess(decodedText) {
    const student = studentMap[decodedText];
    if (!student) return;

    const time = new Date().toLocaleTimeString();

    attendanceData[decodedText] = { section: student.section, time: time };
    student.element.classList.add("present");
    student.element.querySelector(".time").textContent = "⏰ " + time;

    presentCount = Object.keys(attendanceData).length;
    document.getElementById("presentCount").textContent = presentCount;

    localStorage.setItem(STORAGE_KEY, JSON.stringify(attendanceData));

    // SEND TO SERVER
    fetch("/attendance", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id: decodedText, section: student.section, time: time })
    });
}

/* ✅ START SCANNER (YOU WERE MISSING THIS) */
const html5QrCode = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices => {
    if (devices && devices.length) {
        html5QrCode.start(
            devices[0].id,
            { fps: 10, qrbox: 250 },
            onScanSuccess
        );
    }
});
</script>
